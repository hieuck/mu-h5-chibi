# ─── FORMULAS ────────────────────────────────────────────────────────────────
# Shared formulas and curves referenced by multiple systems.

formulas:
  - name: experience_required_per_level
    status: active
    source: src/game/entities/character.ts
    referenced_by:
      - src/game/entities/character.ts
      - design/gdd/character-progression-system.md
    expression: "level * 100"
    variables:
      level: current character level
    added: 2026-07-09
    revised: ""

  - name: base_damage
    status: active
    source: src/game/systems/combat.ts
    referenced_by:
      - src/game/systems/combat.ts
      - design/gdd/combat-system.md
